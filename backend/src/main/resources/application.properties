# Nombre de la aplicaciï¿½n
spring.application.name=gestioncitasmedicas

# Configuraciï¿½n del servidor
server.port=8080

# Configuraciï¿½n de PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_citas_medicas
spring.datasource.username=postgres
spring.datasource.password=564040
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraciï¿½n de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger Configuration
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuraciï¿½n para manejar fechas
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/El_Salvador