# Nombre de la aplicaciůn
spring.application.name=gestioncitasmedicas

# Configuraciůn del servidor
server.port=8080

# Configuraciůn de PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_citas_medicas
spring.datasource.username=tu_usuario
spring.datasource.password=tu_contraseŮa
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraciůn de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger Configuration
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuraciůn para manejar fechas
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/El_Salvador